<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expansor de Fonemas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a2e;
      --ink-light: #4a4a6a;
      --bg: #f8f6f1;
      --card: #ffffff;
      --accent: #0f3460;
      --accent-hover: #1a5276;
      --success: #2e7d32;
      --success-bg: #e8f5e9;
      --success-border: #a5d6a7;
      --warn-bg: #fff3e0;
      --warn-border: #ffcc80;
      --warn-text: #e65100;
      --border: #e0dcd4;
      --border-focus: #0f3460;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 36px 40px 32px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; position: relative; }
    .header p { margin-top: 6px; font-size: 14px; opacity: 0.6; font-weight: 400; }
    .main { max-width: 860px; margin: 0 auto; padding: 32px 24px 60px; }
    .how-box {
      background: #eef2f9; border: 1px solid #c5d4e8; border-radius: 10px;
      padding: 18px 22px; margin-bottom: 28px; font-size: 13.5px;
      line-height: 1.75; color: #1a3a5c;
    }
    .how-box strong { font-size: 14px; }
    .how-box code {
      background: #fff; padding: 2px 7px; border-radius: 4px;
      border: 1px solid #d4d4d4; font-family: var(--mono); font-size: 12px;
    }
    .how-box em { color: var(--accent); font-style: italic; }
    .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-light); }
    .btn { border: none; border-radius: 7px; font-family: var(--sans); font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn:active { transform: scale(0.97); }
    .btn-ghost { background: transparent; border: 1px solid #bbb; color: #666; padding: 5px 14px; font-size: 12px; }
    .btn-ghost:hover { border-color: #888; color: #333; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white; padding: 12px 36px; font-size: 15px; margin-bottom: 28px;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; filter: none; }
    .btn-copy { background: var(--accent); color: white; padding: 6px 18px; font-size: 12px; }
    .btn-copy.copied { background: var(--success); }
    .textarea {
      width: 100%; min-height: 180px; padding: 16px 18px;
      border: 2px solid var(--border); border-radius: 10px;
      font-family: var(--sans); font-size: 14px; line-height: 1.75;
      color: var(--ink); background: var(--card); resize: vertical;
      outline: none; transition: border-color 0.2s; margin-bottom: 16px;
    }
    .textarea:focus { border-color: var(--border-focus); }
    .textarea::placeholder { color: #aaa; }
    .output-area { animation: slideUp 0.35s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .replacements-box {
      background: var(--success-bg); border: 1px solid var(--success-border);
      border-radius: 10px; padding: 18px 22px; margin-bottom: 18px;
    }
    .replacements-title { font-size: 13px; font-weight: 700; color: var(--success); margin-bottom: 12px; }
    .replacement-item {
      background: #fff; border: 1px solid #c8e6c9; border-radius: 7px;
      padding: 10px 14px; margin-bottom: 8px; font-size: 12.5px; line-height: 1.65;
    }
    .replacement-item:last-child { margin-bottom: 0; }
    .replacement-old { color: #999; text-decoration: line-through; }
    .replacement-new { color: #1b5e20; font-weight: 500; margin-top: 4px; }
    .warn-box {
      background: var(--warn-bg); border: 1px solid var(--warn-border);
      border-radius: 10px; padding: 16px 22px; margin-bottom: 18px;
      font-size: 13px; color: var(--warn-text);
    }
    .result-box {
      background: var(--card); border: 2px solid var(--accent);
      border-radius: 10px; padding: 22px; font-size: 14px;
      line-height: 1.85; white-space: pre-wrap; color: #222;
    }
    details { margin-top: 36px; }
    details summary { cursor: pointer; font-size: 13px; font-weight: 600; color: #666; padding: 8px 0; list-style: none; }
    details summary::before { content: '\25B8 '; }
    details[open] summary::before { content: '\25BE '; }
    .ref-table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 12.5px; }
    .ref-table thead tr { background: var(--ink); color: white; }
    .ref-table th { padding: 10px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .ref-table td { padding: 9px 16px; border-bottom: 1px solid #eee; }
    .ref-table tbody tr:nth-child(even) { background: #fafafa; }
    .ref-table .phoneme-cell { font-family: var(--mono); font-weight: 700; font-size: 15px; }
    .ref-table .sonoro { color: var(--success); }
    .ref-table .sordo { color: #c62828; }
    .ref-table .note { font-size: 10px; color: #888; font-style: italic; }
    .builder {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 22px; margin-bottom: 0;
    }
    .builder-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); margin-bottom: 12px; }
    .builder-howbox {
      background: #f0f4ff; border: 1px solid #c5d4e8; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 13px;
      line-height: 1.7; color: #1a3a5c;
    }
    .builder-howbox code {
      background: #fff; padding: 1px 6px; border-radius: 4px;
      border: 1px solid #d4d4d4; font-family: var(--mono); font-size: 12px;
    }
    .builder-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .builder-input-wrap { flex: 1; min-width: 130px; position: relative; }
    .builder-input {
      width: 100%; padding: 10px 12px;
      border: 2px solid var(--border); border-radius: 8px;
      font-family: var(--mono); font-size: 15px; background: var(--card);
      color: var(--ink); outline: none; transition: border-color 0.2s;
    }
    .builder-input:focus { border-color: var(--border-focus); }
    .builder-input.is-valid { border-color: var(--success); }
    .builder-input.is-invalid { border-color: #e57373; }
    .builder-x { font-family: var(--mono); font-weight: 700; color: var(--accent); font-size: 18px; padding: 0 4px; flex-shrink: 0; }
    .builder-checks { display: flex; flex-wrap: wrap; gap: 14px 18px; margin-bottom: 18px; align-items: center; }
    .builder-check { display: inline-flex; align-items: center; gap: 6px; font-size: 13.5px; cursor: pointer; user-select: none; }
    .builder-check input { cursor: pointer; width: 16px; height: 16px; accent-color: var(--accent); }
    .builder-check--todas { margin-left: auto; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 12.5px; color: var(--accent); }
    .builder .btn-primary { margin-bottom: 0; }
    .builder-output { margin-top: 18px; animation: slideUp 0.35s ease; }
    .section-divider {
      display: flex; align-items: center; gap: 14px;
      margin: 28px 0; color: var(--ink-light); font-size: 12px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    @media (max-width: 600px) {
      .header { padding: 28px 20px 24px; }
      .header h1 { font-size: 22px; }
      .main { padding: 24px 16px 48px; }
      .btn-primary { width: 100%; text-align: center; }
      .builder-row { flex-direction: column; align-items: stretch; }
      .builder-x { text-align: center; }
      .builder-check--todas { margin-left: 0; }
    }
  </style>
</head>
<body>

  <div class="header">

        setCopied(true);
        setTimeout(function() { setCopied(false); }, 2000);
      }, [output]);

      return e("div", null,
        /* ── Sustitution builder ── */
        e(SustitutionBuilder),

        /* ── Separator ── */
        e("div", { className: "section-divider" }, "Expansor de fonemas"),

        /* ── How it works ── */
        e("div", { className: "how-box" },
          e("strong", null, "\u00bfC\u00f3mo funciona?"), e("br"),
          "Detecta fonemas entre barras como ",
          e("code", null, "/d/"),
          " y a\u00f1ade su descripci\u00f3n delante:", e("br"),
          e("em", null,
            "/d/ \u2192 oclusivo alveolar sonoro /d/"
          )
        ),

        /* ── Input ── */
        e("div", { className: "label-row" },
          e("span", { className: "label" }, "Texto del informe"),
          e("button", {
            className: "btn btn-ghost",
            onClick: function() { setInput(EXAMPLE); setOutput(null); setCopied(false); }
          }, "Cargar ejemplo")
        ),
        e("textarea", {
          className: "textarea", value: input,
          onChange: function(ev) { setInput(ev.target.value); setOutput(null); },
          placeholder: "Pega aqu\u00ed el texto de tu informe con fonemas entre barras:\nSustituci\u00f3n de /d/ por /l/ en codo por colo\nDistorsi\u00f3n del fonema /s/"
        }),
        e("button", {
          className: "btn btn-primary", disabled: !input.trim(), onClick: handleProcess
        }, "Procesar informe"),

        /* ── Output ── */
        output && e("div", { className: "output-area" },

          output.replacements.length > 0
            ? e("div", { className: "replacements-box" },
                e("div", { className: "replacements-title" },
                  output.replacements.length + " fonema(s) expandido(s):"),
                output.replacements.map(function(r, i) {
                  return e("div", { className: "replacement-item", key: i },
                    e("div", { className: "replacement-old" }, r.original),
                    e("div", { className: "replacement-new" }, "\u2192 " + r.expanded)
                  );
                })
              )
            : e("div", { className: "warn-box" },
                "No se encontraron fonemas entre barras. Aseg\u00farate de usar el formato /fonema/ en tu texto."
              ),

          e("div", { className: "label-row", style: { marginBottom: 8 } },
            e("span", { className: "label" }, "Resultado"),
            e("button", {
              className: "btn btn-copy" + (copied ? " copied" : ""),
              onClick: handleCopy
            }, copied ? "\u2713 Copiado" : "Copiar")
          ),
          e("div", { className: "result-box" }, output.result)
        ),

        /* ── Reference table ── */
        e("details", null,
          e("summary", null, "Ver tabla de fonemas de referencia"),
          e("table", { className: "ref-table" },
            e("thead", null,
              e("tr", null,
                e("th", null, "Fonema"),
                e("th", null, "Modo"),
                e("th", null, "Punto"),
                e("th", null, "Sonoridad")
              )
            ),
            e("tbody", null,
              TABLE_DISPLAY.map(function(row, i) {
                return e("tr", { key: row.ph + i },
                  e("td", { className: "phoneme-cell" },
                    "/" + row.ph + "/",
                    row.note ? e("span", { className: "note", style: { marginLeft: 6 } }, row.note) : null
                  ),
                  e("td", null, row.modo),
                  e("td", null, row.punto),
                  e("td", { className: row.son === "sonoro" ? "sonoro" : "sordo" }, row.son)
                );
              })
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(e(App));
  </script>
</body>
</html>
